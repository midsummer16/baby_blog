version: '3.8'

services:
  web:
    build: .
    ports:
      - "11118:8000"
    volumes:
      - db_data:/app/data
      - media_data:/app/media
    environment:
      - DJANGO_SECRET_KEY=change-this-to-a-secure-random-key
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=*

volumes:
  db_data:
  media_data:
